<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useless Search</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">
                <span class="color-blue">U</span><span class="color-red">s</span><span class="color-yellow">e</span><span class="color-blue">l</span><span class="color-green">e</span><span class="color-red">s</span><span class="color-yellow">s</span>
            </h1>
        </header>
        
        <main>
            <form id="search-form" class="search-box">
                <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="search-icon"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                <input type="text" id="search-input" placeholder="Search the unknown..." autocomplete="off">
                <button type="button" class="mic-icon" title="Disabled">
                    <svg focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285f4" d="m12 15c1.66 0 3-1.31 3-2.97v-7.02c0-1.66-1.34-3.01-3-3.01s-3 1.34-3 3.01v7.02c0 1.66 1.34 2.97 3 2.97z"></path><path fill="#34a853" d="m11 18.08h2v3.92h-2z"></path><path fill="#fbbc05" d="m7.05 16.87c-1.27-1.33-2.05-2.8-2.05-4.67h2c0 1.45.56 2.42 1.47 3.38v.32l-1.15 1.18z"></path><path fill="#ea4335" d="m12 16.93a4.97 5.25 0 0 1 -3.54 -1.55l-1.41 1.49c1.26 1.34 3.02 2.13 4.95 2.13 3.87 0 6.99-2.92 6.99-7h-1.99c0 2.92-2.24 4.93-5 4.93z"></path></svg>
                </button>
            </form>
            <div class="button-group">
                <button id="search-btn" class="btn">Useless Search</button>
                <button id="lucky-btn" class="btn">I'm Feeling Unlucky</button>
            </div>
            
            <div id="results-container" class="results-container hidden">
                <div class="loader hidden" id="loader">
                    <div class="spinner"></div>
                    <p>Generating a useless answer...</p>
                </div>
                <div class="result hidden" id="result">
                    <h2 id="result-text"></h2>
                    <p class="sub-text">About 0 results (0.00 seconds)</p>
                </div>
            </div>
        </main>
        
        <footer>
            <div class="footer-links">
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search Doesn't Work</a>
            </div>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
