<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Un-centerer | Premium Web Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="chaos-wrapper">
        <div class="glass-card" id="main-card">
            <h1>The <span class="gradient-text">Un-centerer</span></h1>
            <p class="subtitle">Experience the cutting edge of CSS-only spatial disorientation.</p>

            <div class="target-area">
                <div class="target-box" id="target-box">
                    I am perfectly centered.
                </div>
            </div>

            <div class="controls">
                <button class="btn primary shadow-evade" id="btn-fix">Auto-Align</button>
                <button class="btn secondary" id="btn-reset">Reset Margins</button>
            </div>

            <div class="checkbox-chaos">
                <input type="checkbox" id="chaos-toggle">
                <label for="chaos-toggle" class="chaos-label">Enable CSS Fixes</label>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
